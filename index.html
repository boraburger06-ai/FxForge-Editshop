<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FxForge | Editshop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.gif" class="logo" alt="logo">
  <h1>FxForge</h1>
  <p class="subtitle">Editshop</p>
</header>

<section class="products">

  <div class="card">
    <h2>Basic Montage</h2>
    <p>0-14 clips</p>
    <p class="price">€5</p>
    <button onclick="window.location.href='https://tikkie.me/pay/1'">Buy</button>
  </div>

  <div class="card">
    <h2>Pro Montage</h2>
    <p>8-18 clips + thumbnail</p>
    <p class="price">€10</p>
    <button onclick="window.location.href='https://tikkie.me/pay/2'">Buy</button>
  </div>

  <div class="card">
    <h2>Ultra Montage</h2>
    <p>10-20 clips + cinematic</p>
    <p class="price">€20</p>
    <button onclick="window.location.href='https://tikkie.me/pay/3'">Buy</button>
  </div>

</section>

</body>
</html>
