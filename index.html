<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FxForge | Editshop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PARTICLES -->
<div id="particles"></div>

<header>
  <img src="logo.gif" class="logo">
  <h1>FXFORGE</h1>
  <p class="subtitle">Editshop</p>
</header>

<section class="products">
  <div class="card">
  <h2>Thumbnail</h2>
  <p>Custom thumbnail design (YouTube / edits)</p>
  <p class="price">€2.50</p>
  <button onclick="window.location.href='https://tikkie.me/pay/JOUW-THUMBNAIL-LINK'">
    Buy
  </button>
</div>

  <div class="card">
    <h2>Basic Montage</h2>
    <p>0-14 clips</p>
    <p class="price">€5</p>
    <button onclick="window.location.href='https://tikkie.me/pay/1'">Buy</button>
  </div>

  <div class="card">
    <h2>Pro Montage</h2>
    <p>8-18 clips + thumbnail</p>
    <p class="price">€10</p>
    <button onclick="window.location.href='https://tikkie.me/pay/2'">Buy</button>
  </div>

  <div class="card">
    <h2>Ultra Montage</h2>
    <p>10-20 clips + cinematic</p>
    <p class="price">€20</p>
    <button onclick="window.location.href='https://tikkie.me/pay/3'">Buy</button>
  </div>

</section>

<script>
const container = document.getElementById("particles");

for (let i = 0; i < 60; i++) {
  const p = document.createElement("div");
  p.classList.add("particle");

  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  p.style.opacity = Math.random();

  container.appendChild(p);
}
</script>

</body>
</html>
