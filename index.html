<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FxForge | Editshop</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
</head>

<body>

<div id="particles"></div>

<header>
  <img src="logo.gif" class="logo">
  <h1>FXFORGE</h1>
  <p class="subtitle">Premium Editshop</p>
</header>

<section class="products">

  <!-- THUMBNAIL -->
  <div class="card">
    <h2>Thumbnail</h2>
    <p>Custom YouTube thumbnail</p>
    <p class="price">€0,50</p>
    <a class="buy-btn"
       href="https://betaalverzoek.rabobank.nl/betaalverzoek/?id=SZhQDGYqTsCvpeTJfK3Itg"
       target="_blank">
      Buy Now
    </a>
  </div>

  <!-- BASIC (MOST BOUGHT) -->
  <div class="card basic">

    <div class="badge">💎 MOST BOUGHT</div>

    <h2>Basic Montage</h2>
    <p>0–14 clips</p>
    <p class="price">€3.50</p>

    <a class="buy-btn"
       href="https://betaalverzoek.rabobank.nl/betaalverzoek/?id=FoFhVXWTTeCQGcCJZnq1WA"
       target="_blank">
      Buy Now
    </a>
  </div>

  <!-- PRO -->
  <div class="card">
    <h2>Pro Montage</h2>
    <p>8–20 clips + thumbnail</p>
    <p class="price">€4.50</p>
    <a class="buy-btn"
       href="https://betaalverzoek.rabobank.nl/betaalverzoek/?id=8ctAXXoLTZy3bOywkaleKA"
       target="_blank">
      Buy Now
    </a>
  </div>

  <!-- ULTRA -->
  <div class="card">
    <h2>Ultra Montage</h2>
    <p>15–25 clips + cinematic</p>
    <p class="price">€6.00</p>
    <a class="buy-btn"
       href="https://betaalverzoek.rabobank.nl/betaalverzoek/?id=HHbERiH3TeC3ra6hRKs0UA"
       target="_blank">
      Buy Now
    </a>
  </div>

</section>

<script>
const container = document.getElementById("particles");

for (let i = 0; i < 80; i++) {
  const p = document.createElement("div");
  p.classList.add("particle");

  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (6 + Math.random() * 10) + "s";
  p.style.opacity = Math.random();

  container.appendChild(p);
}
</script>

</body>
</html>
