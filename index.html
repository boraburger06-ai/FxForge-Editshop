<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FxForge | Editshop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body>

<!-- SOUND -->
<audio id="hoverSound" src="hover.mp3" preload="auto"></audio>

<!-- PARTICLES -->
<div id="particles"></div>

<header>
  <img src="logo.gif" class="logo">
  <h1>FXFORGE</h1>
  <p class="subtitle">Premium Editshop</p>
</header>

<section class="products">

  <div class="card">
    <h2>Thumbnail</h2>
    <p>Custom YouTube thumbnail</p>
    <p class="price">€2.50</p>
    <button class="disabled">Coming Soon</button>
  </div>

  <!-- 🔥 MAIN CARD -->
  <div class="card basic">

    <div class="badge">MOST POPULAR</div>

    <h2>Basic Montage</h2>
    <p>0–14 clips</p>
    <p class="price">€3.50</p>

    <a href="https://betaalverzoek.rabobank.nl/betaalverzoek/?id=FoFhVXWTTeCQGcCJZnq1WA"
       target="_blank"
       class="buy-btn">
       Buy Now
    </a>
  </div>

  <div class="card">
    <h2>Pro Montage</h2>
    <p>8–20 clips + thumbnail</p>
    <p class="price">€4.50</p>
    <button class="disabled">Coming Soon</button>
  </div>

  <div class="card">
    <h2>Ultra Montage</h2>
    <p>15–25 clips + cinematic</p>
    <p class="price">€6.00</p>
    <button class="disabled">Coming Soon</button>
  </div>

</section>

<script>
/* PARTICLES */
const container = document.getElementById("particles");

for (let i = 0; i < 80; i++) {
  const p = document.createElement("div");
  p.classList.add("particle");

  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (6 + Math.random() * 10) + "s";
  p.style.opacity = Math.random();

  container.appendChild(p);
}

/* HOVER SOUND */
const sound = document.getElementById("hoverSound");

document.querySelectorAll("button, .buy-btn").forEach(el => {
  el.addEventListener("mouseenter", () => {
    sound.currentTime = 0;
    sound.play();
  });
});
</script>

</body>
</html>
