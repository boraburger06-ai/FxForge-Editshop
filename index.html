<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FxForge | Editshop</title>

</head>

<body>

<header>
  <img src="logo.gif" class="logo">
  <h1>FxForge</h1>
  <p class="subtitle">Editshop</p>
</header>

<section class="products">

  <div class="card">
    <h2>Basic Montage</h2>
    <p>Bevat een montage met 0-14 clips</p>
    <p class="price">€5</p>
    <button onclick="window.location.href='https://tikkie.me/pay/JOUW1'">Buy</button>
  </div>

  <div class="card">
    <h2>Pro Montage</h2>
    <p>Bevat een montage met thumbnail 8-18 clips</p>
    <p class="price">€10</p>
    <button onclick="window.location.href='https://tikkie.me/pay/JOUW2'">Buy</button>
  </div>

  <div class="card">
    <h2>Ultra Montage</h2>
    <p>Bevat een montage met thumbnail en cinematic 10-20 clips</p>
    <p class="price">€20</p>
    <button onclick="window.location.href='https://tikkie.me/pay/JOUW3'">Buy</button>
  </div>

</section>

<footer>
  <p>© 2026 FxForge</p>
</footer>

</body>
</html>
